name: Cypress Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress-tests:
    name: Cypress ${{ matrix.suite }} tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        suite:
          - api
          - front

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npm run test:${{ matrix.suite }}

      - name: Upload Cypress failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-${{ matrix.suite }}-${{ github.run_id }}
          path: |
            cypress/screenshots
            cypress/videos
          if-no-files-found: ignore
          retention-days: 7